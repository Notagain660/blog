name: Main to Gitee

on:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to Gitee mirror
        run: 
          git remote add gitee https://git:${{ secrets.GITEE_TOKEN }}@gitee.com/xinxin-has-arrived/blog.git
          git push -f gitee HAED:master
